# =====================
# Application Identity
# =====================
spring.application.name=api-gateway

# =====================
# Config Server Import
# The gateway pulls its full config from the Config Server.
# This is the only bootstrap config needed locally.
# =====================
spring.config.import=optional:configserver:http://localhost:8888

# =====================
# Fallback: if Config Server is unavailable, use these
# =====================
server.port=8080

# =====================
# Eureka Client
# =====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =====================
# Gateway - Discovery Locator
# Allows lb://SERVICE-NAME routing via Eureka
# =====================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# =====================
# Actuator
# =====================
management.endpoints.web.exposure.include=health,info,gateway,env
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# =====================
# Logging
# =====================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=WARN

jwt.secret=smartorders-super-secret-jwt-key-2026
