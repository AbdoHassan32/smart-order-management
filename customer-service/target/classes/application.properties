# =====================
# Application Identity
# =====================
spring.application.name=customer-service

# =====================
# Config Server Import
# All other config is pulled from Config Server at startup
# =====================
spring.config.import=optional:configserver:http://localhost:8888

# =====================
# Fallback values if Config Server is unavailable
# =====================
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/customer_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =====================
# Actuator
# =====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================
# Swagger UI
# =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =====================
# Logging
# =====================
logging.level.com.smartorders.customer=INFO