# =====================
# Server Configuration
# =====================
server.port=8888

# =====================
# Application Identity
# =====================
spring.application.name=config-server

# =====================
# Config Server - Native Profile
# Using classpath:/configs means files live inside src/main/resources/configs/
# =====================
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/configs/

# =====================
# Eureka Client
# Config Server registers itself so other services can discover it
# =====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =====================
# Actuator
# =====================
management.endpoints.web.exposure.include=health,info,env
management.endpoint.health.show-details=always

# =====================
# Logging
# =====================
logging.level.org.springframework.cloud.config=INFO