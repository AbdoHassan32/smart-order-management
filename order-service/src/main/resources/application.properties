spring.application.name=order-service
spring.config.import=optional:configserver:http://localhost:8888

server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Feign client timeout settings
feign.client.config.default.connect-timeout=10000
feign.client.config.default.read-timeout=10000

management.endpoints.web.exposure.include=health,info,circuitbreakers,retryevents
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.smartorders.order=INFO
logging.level.com.smartorders.order.client=DEBUG


# =====================
# Resilience4j Circuit Breaker
# =====================

# Customer Service circuit breaker
resilience4j.circuitbreaker.instances.customerService.sliding-window-size=10
resilience4j.circuitbreaker.instances.customerService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.customerService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.customerService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.customerService.automatic-transition-from-open-to-half-open-enabled=true

# Inventory Service circuit breaker
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.inventoryService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.inventoryService.automatic-transition-from-open-to-half-open-enabled=true

# Payment Service circuit breaker
resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.paymentService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.paymentService.automatic-transition-from-open-to-half-open-enabled=true

# =====================
# Resilience4j Retry
# =====================
resilience4j.retry.instances.customerService.max-attempts=3
resilience4j.retry.instances.customerService.wait-duration=1s

resilience4j.retry.instances.inventoryService.max-attempts=3
resilience4j.retry.instances.inventoryService.wait-duration=1s

# =====================
# Resilience4j Timeout
# =====================
# Disable TimeLimiter - causes false timeouts on cold start in Docker
resilience4j.timelimiter.instances.customerService.timeout-duration=700s
resilience4j.timelimiter.instances.inventoryService.timeout-duration=700s
resilience4j.timelimiter.instances.paymentService.timeout-duration=700s
# Enable Feign circuit breaker support
spring.cloud.openfeign.circuitbreaker.enabled=true

spring.cloud.openfeign.circuitbreaker.alphanumeric-ids.enabled=true
management.health.circuitbreakers.enabled=true
management.health.retryevents.enabled=true